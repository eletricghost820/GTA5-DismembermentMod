name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Download SHVDN
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/scripthookvdotnet/scripthookvdotnet/releases/download/v3.6.0/ScriptHookVDotNet-3.6.0.zip" -OutFile shvdn.zip
          Expand-Archive -Path shvdn.zip -DestinationPath shvdn -Force
          New-Item -ItemType Directory -Force -Path Dismemberment\SHVDN
          Copy-Item shvdn\ScriptHookVDotNet2.dll Dismemberment\SHVDN\
      - name: Build
        run: dotnet build Dismemberment.sln -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: Dismemberment
          path: '**/bin/Release/**/*.dll'
