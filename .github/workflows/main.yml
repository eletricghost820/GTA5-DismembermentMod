name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet build Dismemberment.sln -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: Dismemberment
          path: '**/bin/Release/**/*.dll'
