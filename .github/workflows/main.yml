name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '4.8'
      - run: dotnet build Dismemberment.sln -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: Dismemberment
          path: '**/bin/Release/**/*.dll'
