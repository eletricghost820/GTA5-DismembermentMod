name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download SHVDN
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/scripthookvdotnet/scripthookvdotnet-nightly/releases/latest/download/ScriptHookVDotNet-nightly.zip" -OutFile shvdn.zip
          Expand-Archive -Path shvdn.zip -DestinationPath shvdn -Force
          New-Item -ItemType Directory -Force -Path Dismemberment | Out-Null
          Copy-Item shvdn\ScriptHookVDotNet*.dll Dismemberment -Force

      - name: Build
        run: dotnet build Dismemberment.sln -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: Dismemberment
          path: Dismemberment\bin\Release\*.dll
